server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the Angular SPA; fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend. The host "product-api" resolves to:
    #   - the Docker container name on app-net (local), OR
    #   - the Kubernetes Service named product-api (in-cluster).
    # Override with PROXY_PASS_HOST at container start if needed.
    location /api/ {
        proxy_pass http://product-api:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
